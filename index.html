<!DOCTYPE html>
<html>
<head>
  <title>Lal Kitab Live Session</title>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyA5pWE5v7GJZuHtZsIHpuwCUWWCFI_Tt5k",
      authDomain: "vedic-lal-kitab.firebaseapp.com",
      databaseURL: "https://vedic-lal-kitab-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "vedic-lal-kitab",
      storageBucket: "vedic-lal-kitab.firebasestorage.app",
      messagingSenderId: "429980316495",
      appId: "1:429980316495:web:fcb81e86cbd6b1127f8b3a"
    };
    firebase.initializeApp(firebaseConfig);
    var database = firebase.database();
  </script>
</head>

<body style="font-family: Arial; text-align:center; background:#f4f4f4; padding:30px;">

  <h1>Lal Kitab Live Session</h1>
  <h2>₹49 only</h2>

  <button id="showFormBtn">Buy Now</button>

  <div id="detailsBox" style="display:none;">
    <input id="name" placeholder="Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input id="mobile" placeholder="Mobile"><br><br>
    <button id="payBtn">Pay Now</button>
  </div>

  <div id="successBox" style="display:none; background:#c8f7c5; padding:20px;">
    <h2>Payment Successful ✅</h2>
    <p>We will contact you soon</p>
  </div>

  <script>
    document.getElementById("showFormBtn").onclick = () => {
      document.getElementById("detailsBox").style.display = "block";
    };

    document.getElementById("payBtn").onclick = async () => {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const mobile = document.getElementById("mobile").value;

      const res = await fetch("/.netlify/functions/create-order", { method: "POST" });
      const order = await res.json();

      var options = {
        key: order.key,
        amount: order.amount,
        currency: "INR",
        order_id: order.id,
        name: "Lal Kitab Session",
        handler: async function (response) {

          const verifyRes = await fetch("/.netlify/functions/verify-payment", {
            method: "POST",
            body: JSON.stringify({
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature,
              name, email, mobile
            })
          });

          const result = await verifyRes.json();

          if (result.success) {
            await database.ref("payments").push({
              name,
              email,
              mobile,
              payment_id: response.razorpay_payment_id,
              time: new Date().toString()
            });

            document.getElementById("detailsBox").style.display = "none";
            document.getElementById("successBox").style.display = "block";
          } else {
            alert("Payment verification failed");
          }
        }
      };

      new Razorpay(options).open();
    };
  </script>

</body>
</html>
