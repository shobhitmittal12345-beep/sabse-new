<!DOCTYPE html>
<html>
<head>
  <title>Lal Kitab Live Session</title>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    
    var firebaseConfig = {
      apiKey: "AIzaSyA5pWE5v7GJZuHtZsIHpuwCUWWCFI_Tt5k",
      authDomain: "vedic-lal-kitab.firebaseapp.com",
      databaseURL: "https://vedic-lal-kitab-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "vedic-lal-kitab",
      storageBucket: "vedic-lal-kitab.firebasestorage.app",
      messagingSenderId: "429980316495",
      appId: "1:429980316495:web:fcb81e86cbd6b1127f8b3a"
    };

    firebase.initializeApp(firebaseConfig);
    var database = firebase.database();
  </script>
</head>

<body style="font-family: Arial; text-align:center; background:#f4f4f4; padding:30px;">

  <h1>Live Vedic Science Session – Lal Kitab</h1>
  <p>2 hours live session for beginners</p>
  <h2>Price: ₹49 only</h2>

  <br>

  <!-- BUY BUTTON FIRST -->
  <button id="showFormBtn" style="padding:12px 22px; font-size:18px;">
    Buy Now
  </button>

  <br><br>

  <!-- DETAILS FORM (hidden at first) -->
  <div id="detailsBox" style="display:none;">
    <h3>Enter your details</h3>

    <form id="payForm">
      <input type="text" id="name" placeholder="Your Name" required><br><br>
      <input type="email" id="email" placeholder="Your Email" required><br><br>
      <input type="tel" id="mobile" placeholder="Your Mobile Number" pattern="[0-9]{10}" required><br><br>

      <button type="submit" style="padding:10px 18px; font-size:16px;">
        Proceed to Payment
      </button>
    </form>
  </div>

  <script>
    document.getElementById("showFormBtn").onclick = function () {
      document.getElementById("detailsBox").style.display = "block";
      this.style.display = "none";
    };

    document.getElementById("payForm").addEventListener("submit", function(e){
      e.preventDefault();

      var name   = document.getElementById("name").value;
      var email  = document.getElementById("email").value;
      var mobile = document.getElementById("mobile").value;

      var options = {
        key: "rzp_test_SJ51ElVsMRuWJ2",  
        amount: 4900,
        currency: "INR",
        name: "Lal Kitab Live Session",
        description: "2 hour live class",

        prefill: {
          name: name,
          email: email,
          contact: mobile
        },

       
        handler: function (response) {
          database.ref("orders").push({
            name: name,
            email: email,
            mobile: mobile,
            paymentId: response.razorpay_payment_id,
            time: new Date().toString()
          });

          alert("Payment Successful! We will contact you soon.");
        }
      };

      var rzp = new Razorpay(options);
      rzp.open();
    });
  </script>

</body>
</html>
